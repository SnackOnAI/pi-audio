services:
  # Optional development Icecast server. The Python audio stack itself runs as
  # one systemd service and supervises its own FFmpeg and rclone processes.
  icecast:
    image: moul/icecast
    container_name: icecast
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./config/icecast.xml:/etc/icecast.xml
