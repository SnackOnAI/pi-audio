application:
  name: "pi-audio-stack"
  version: "0.1.0"

audio:
  device: "plughw:CARD=Mic,DEV=0"
  sample_rate: 16000
  channels: 1
  sample_width_bytes: 2
  chunk_duration_ms: 30
  queue_size: 250

gain:
  enabled: true
  mixer_device: "hw:CARD=Mic"
  mixer_control: "Mic"
  operation_timeout_seconds: 5

stream:
  enabled: true
  encoder: "ffmpeg"
  bitrate_kbps: 64
  icecast_url: "icecast://source:${ICECAST_SOURCE_PASSWORD}@127.0.0.1:8000/live.mp3"
  restart_delay_seconds: 5

vad:
  enabled: true
  engine: "webrtc"
  aggressiveness: 2
  minimum_speech_ms: 250

activity:
  enabled: true
  threshold_dbfs: -15.0
  minimum_active_ms: 90
  silence_timeout_ms: 1000
  pre_buffer_ms: 1500
  post_buffer_ms: 750

recording:
  directory: "./recordings"
  format: "mp3"
  bitrate_kbps: 64
  minimum_duration_ms: 500
  maximum_duration_seconds: 3600
  metadata_enabled: true

upload:
  enabled: true
  remote: "dropbox-audio"
  destination: "Pi Audio"
  scan_interval_seconds: 10
  settle_seconds: 2
  operation_timeout_seconds: 300
  retry_initial_seconds: 30
  retry_max_seconds: 3600
  delete_after_success: true
  local_retention_hours: 48
  wait_for_transcription: true
  date_subdirectories: true

transcription:
  enabled: true
  provider: "openai"
  model: "gpt-4o-transcribe"
  api_key_environment: "OPENAI_API_KEY"
  language: "en"
  prompt: "Raspberry Pi room audio captured with a Samson Go Mic. Preserve names, technical terms, and natural punctuation."
  scan_interval_seconds: 10
  settle_seconds: 2
  operation_timeout_seconds: 600
  retry_initial_seconds: 30
  retry_max_seconds: 3600
  minimum_speech_ms: 300
  vad_aggressiveness: 2
  max_monthly_audio_minutes: 1500

logging:
  level: "INFO"
  directory: "./logs"
  filename: "audio-stack.log"
  max_bytes: 10485760
  backup_count: 5
  console: true
  json: true

health:
  enabled: true
  interval_seconds: 30
  file: "./logs/health.json"

control_api:
  enabled: true
  host: "127.0.0.1"
  port: 8765
  token_environment: "HOME_ASSISTANT_TOKEN"
